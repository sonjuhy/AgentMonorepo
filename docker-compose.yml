services:

  # ─────────────────────────────────────────────
  # 장기 실행: Slack 메시지 수신 → LLM 분류 → 에이전트 디스패치
  # ─────────────────────────────────────────────
  slack_listener:
    build:
      context: .
      dockerfile: agents/slack_agent/Dockerfile.listener
    image: agentmonorepo-slack_listener
    restart: unless-stopped
    ports:
      # FastAPI 헬스체크 및 REST API 포트
      - "${PORT:-8000}:8000"
    environment:
      # Slack Socket Mode 인증 (필수)
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      # 메시지 발송 채널 ID (필수, slack_sdk WebClient 사용)
      - SLACK_CHANNEL=${SLACK_CHANNEL}
      # LLM 분류기 선택: claude_api | gemini_api | claude_cli | gemini_cli
      - CLASSIFIER_BACKEND=${CLASSIFIER_BACKEND:-claude_api}
      # LLM API 키 (선택한 백엔드에 맞게 설정)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Notion 연동 (에이전트에 전달)
      - NOTION_TOKEN=${NOTION_TOKEN:-}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID:-}
      # FastAPI 서버 바인드 설정
      - HOST=0.0.0.0
      - PORT=8000
      # 에이전트 이미지 이름 재정의 (선택)
      - AGENT_IMAGE_PLANNING_AGENT=${AGENT_IMAGE_PLANNING_AGENT:-agentmonorepo-planning_agent}
      - AGENT_IMAGE_SLACK_AGENT=${AGENT_IMAGE_SLACK_AGENT:-agentmonorepo-slack_agent}
    volumes:
      # DooD(Docker-outside-of-Docker): 에이전트 컨테이너 실행을 위해 호스트 소켓 마운트
      - /var/run/docker.sock:/var/run/docker.sock

  # ─────────────────────────────────────────────
  # 단발성 에이전트: slack_listener가 docker run 으로 직접 호출
  # profile: agents → 직접 up 하지 않고 빌드 대상으로만 관리
  # ─────────────────────────────────────────────
  planning_agent:
    build:
      context: .
      dockerfile: agents/planning_agent/Dockerfile.alpine
    image: agentmonorepo-planning_agent
    profiles:
      - agents
    environment:
      - NOTION_TOKEN=${NOTION_TOKEN}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Slack 메시지 컨텍스트 (dispatcher가 docker run -e 로 주입)
      - SLACK_MESSAGE_TEXT
      - SLACK_MESSAGE_USER
      - SLACK_MESSAGE_CHANNEL
      - SLACK_MESSAGE_TS
      - SLACK_MESSAGE_THREAD_TS

  slack_agent:
    build:
      context: .
      dockerfile: agents/slack_agent/Dockerfile.alpine
    image: agentmonorepo-slack_agent
    profiles:
      - agents
    environment:
      - NOTION_TOKEN=${NOTION_TOKEN}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_CHANNEL=${SLACK_CHANNEL}
      - SLACK_MESSAGE_TEXT
      - SLACK_MESSAGE_USER
      - SLACK_MESSAGE_CHANNEL
      - SLACK_MESSAGE_TS
      - SLACK_MESSAGE_THREAD_TS
